<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMNI Engine</title>
    <style>
        body {
            width: 350px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 15px;
            margin: 0;
        }
        h2 {
            margin-top: 0;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 16px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2ea043;
        }
        #output {
            margin-top: 15px;
            padding: 10px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h2>OMNI GUI Bridge</h2>
    <input type="text" id="target-file" value="master.poly" style="width: 93%; padding: 8px; border-radius: 4px; border: 1px solid #30363d; background: #010409; color: white;">
    <button id="compile-btn">Compile via OMNI</button>
    
    <div id="output">System idle. Awaiting command...</div>

    <script src="popup.js"></script>
</body>
</html>
